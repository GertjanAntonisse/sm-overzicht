<!DOCTYPE html><html lang="nl"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Synesthetic Minds — Dashboards</title>
<style>
:root{--bg:#f6f3ec;--surface:#fffdf8;--ink:#1f2937;--muted:#667085;--line:#ddd5c7;--accent:#0f766e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",sans-serif;background:var(--bg);color:var(--ink);display:flex;min-height:100vh;align-items:center;justify-content:center;padding:40px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:48px 52px;max-width:560px}
h1{font-size:26px;font-weight:800;margin-bottom:4px}
.slogan{color:var(--accent);font-weight:600;margin-bottom:28px}
a.item{display:block;border:1px solid var(--line);border-radius:10px;padding:18px 20px;text-decoration:none;color:var(--ink);margin-bottom:12px}
a.item:hover{border-color:var(--accent)}
.item-title{font-weight:700}
.item-sub{font-size:13px;color:var(--muted);margin-top:2px}
</style></head><body>
<div class="card">
  <h1>Synesthetic Minds<span style="color:var(--accent)">.</span></h1>
  <div class="slogan">Begrijpen vóór bouwen.</div>
  <a class="item" href="visie-dashboard.html">
    <div class="item-title">Visie-dashboard</div>
    <div class="item-sub">Voorspellingen en horizons, bijgewerkt uit de visie-issues</div>
  </a>
</div>
</body></html>
